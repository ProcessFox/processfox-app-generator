# ProcessFox — frontend (generator SPA) + backend (agent + persistence).
# Images are built in CI (GitHub Actions → GHCR); Coolify only pulls and runs
# them, so the server never builds. V1 persistence uses the file store on a
# volume (no database). Override *_IMAGE if your GHCR owner differs from
# "processfox".

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/processfox/processfox-backend:latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: '8787'
      PROCESSFOX_DATA_DIR: /data
    volumes:
      - pfdata:/data
    healthcheck:
      # Node 22 has global fetch; hits GET /api/health.
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/processfox/processfox-frontend:latest}
    pull_policy: always
    restart: unless-stopped
    # No host port publishing: Coolify's reverse proxy (Traefik) routes the
    # domain to this container's port 80. Publishing 8080 conflicts on the host.
    expose:
      - '80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pfdata:
