name: Build & Deploy

# Builds the frontend + backend images on a GitHub runner (plenty of RAM — no
# OOM) and pushes them to the GitHub Container Registry. Coolify then only pulls
# and runs them; the 4 GB server never builds.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: frontend
            dockerfile: packages/runtime/Dockerfile
          - image: backend
            dockerfile: packages/agent/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image path
        id: meta
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/processfox-${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.repo }}:latest
            ${{ steps.meta.outputs.repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        env:
          WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "COOLIFY_WEBHOOK not set — skipping auto-deploy. Click Redeploy in Coolify instead."
            exit 0
          fi
          curl -fsSL -X GET "$WEBHOOK" -H "Authorization: Bearer $TOKEN"
